# Fly.io config for the VantageIQ API.
# app name is set at deploy time; this file is the service definition.
app = "vantageiq-api"
primary_region = "iad"

# Run schema sync + (idempotent, upsert-based) seed once per deploy, before the
# new machine takes traffic. DATABASE_URL is injected from Fly secrets.
[deploy]
  release_command = "sh -c 'npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts'"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: the API holds long-lived SSE streams, so never stop the machine
  # mid-stream. min 1 keeps it warm (no cold starts).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Swap cushions Node/Prisma memory spikes so a 256MB machine doesn't hard-OOM
# at boot. Bump `memory` to 512mb if it still struggles.
swap_size_mb = 512
