# Render blueprint for the VantageIQ API (persistent Node host).
# Why Render and not Vercel for the API: the API holds long-lived SSE streams
# (live agent runs) and launches headless Chromium (PDF export) — both need an
# always-on server, not serverless functions.
#
# Deploy: render.com -> New -> Blueprint -> connect the GitHub repo -> apply.
# Then set the secret env vars below in the Render dashboard.
services:
  - type: web
    name: vantageiq-api
    runtime: node
    plan: starter # 'free' tier may OOM when launching Chromium for PDF export
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed
    startCommand: npx tsx server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # paste your Neon/Render Postgres connection string
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: EXA_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://vantageiq.vercel.app
